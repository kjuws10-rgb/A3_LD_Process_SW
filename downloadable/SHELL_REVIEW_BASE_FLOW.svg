<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .title { font: 700 34px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #102033; }
      .sub { font: 500 18px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #5a6b80; }
      .label { font: 700 19px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #172033; }
      .small { font: 500 15px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #405060; }
      .tiny { font: 500 13px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #526174; }
      .box { stroke-width: 2; rx: 12; ry: 12; }
      .ui { fill: #e8f1ff; stroke: #3b73d9; }
      .common { fill: #fff3df; stroke: #d88924; }
      .file { fill: #eaf7ee; stroke: #3b8f4f; }
      .review { fill: #e8fbfb; stroke: #139aa2; }
      .warn { fill: #fff0f0; stroke: #d94b4b; }
      .lane { fill: #ffffff; stroke: #d4dce7; stroke-width: 1.6; rx: 18; ry: 18; }
      .arrow { stroke: #56677a; stroke-width: 2.4; fill: none; marker-end: url(#arrowHead); }
      .dash { stroke: #7a8795; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4.5 L0,9 z" fill="#56677a"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="1080"/>
  <text class="title" x="70" y="62">Shell UI + Review 측정/오프셋 Base 구조</text>
  <text class="sub" x="72" y="96">상세 운영 UI는 숨기고, 코드 구조와 리뷰 보정 데이터 흐름만 확인하는 로컬 수정본</text>

  <rect class="lane" x="55" y="135" width="1690" height="235"/>
  <text class="label" x="85" y="175">1. 실행 화면 단순화</text>
  <rect class="box ui" x="95" y="210" width="360" height="90"/>
  <text class="label" x="120" y="245">CRootView.xaml</text>
  <text class="small" x="120" y="270">구조 설명용 Shell 화면</text>
  <rect class="box ui" x="535" y="210" width="360" height="90"/>
  <text class="label" x="560" y="245">상세 View 숨김</text>
  <text class="small" x="560" y="270">Main/Manual/Recipe/Setting은 코드만 유지</text>
  <rect class="box common" x="975" y="210" width="360" height="90"/>
  <text class="label" x="1000" y="245">StartCommand 유지</text>
  <text class="small" x="1000" y="270">공정 state machine은 실행 가능</text>
  <rect class="box common" x="1415" y="210" width="280" height="90"/>
  <text class="label" x="1440" y="245">교육/설명 목적</text>
  <text class="small" x="1440" y="270">UI보다 구조 이해 우선</text>
  <path class="arrow" d="M455 255 L535 255"/>
  <path class="arrow" d="M895 255 L975 255"/>
  <path class="arrow" d="M1335 255 L1415 255"/>

  <rect class="lane" x="55" y="410" width="1690" height="285"/>
  <text class="label" x="85" y="450">2. 공정 흐름에 Review 단계 추가</text>
  <rect class="box file" x="95" y="490" width="220" height="78"/>
  <text class="label" x="120" y="522">Recipe</text>
  <text class="small" x="120" y="546">ST_PROCESS_PLAN</text>
  <rect class="box common" x="365" y="490" width="220" height="78"/>
  <text class="label" x="390" y="522">Station</text>
  <text class="small" x="390" y="546">Script / Task 실행</text>
  <rect class="box review" x="635" y="490" width="260" height="78"/>
  <text class="label" x="660" y="522">REVIEW_MEASURE</text>
  <text class="small" x="660" y="546">측정 Batch 생성/수신</text>
  <rect class="box review" x="945" y="490" width="260" height="78"/>
  <text class="label" x="970" y="522">REVIEW_OFFSET</text>
  <text class="small" x="970" y="546">Head별 Offset 계산</text>
  <rect class="box common" x="1255" y="490" width="220" height="78"/>
  <text class="label" x="1280" y="522">Next Plan</text>
  <text class="small" x="1280" y="546">Hxx_OFFSET_X/Y 반영</text>
  <rect class="box common" x="1525" y="490" width="170" height="78"/>
  <text class="label" x="1550" y="522">Complete</text>
  <text class="small" x="1550" y="546">Product/Log 저장</text>
  <path class="arrow" d="M315 529 L365 529"/>
  <path class="arrow" d="M585 529 L635 529"/>
  <path class="arrow" d="M895 529 L945 529"/>
  <path class="arrow" d="M1205 529 L1255 529"/>
  <path class="arrow" d="M1475 529 L1525 529"/>

  <rect class="box warn" x="95" y="610" width="1600" height="55"/>
  <text class="small" x="120" y="642">현재는 실제 Vision/APC I/F가 없으므로 Simulation Review Batch를 생성한다. 실제 연동 시 이 위치에서 통신/파일 데이터를 ST_REVIEW_MEASUREMENT_BATCH로 변환한다.</text>

  <rect class="lane" x="55" y="735" width="1690" height="270"/>
  <text class="label" x="85" y="775">3. 새 Review 데이터 구조</text>
  <rect class="box review" x="95" y="820" width="360" height="115"/>
  <text class="label" x="120" y="853">ST_REVIEW_MEASUREMENT_POINT</text>
  <text class="small" x="120" y="878">Design / Process / Review / Measured 좌표</text>
  <text class="small" x="120" y="902">ErrorX/Y, Tolerance, BeamNo</text>
  <rect class="box review" x="520" y="820" width="330" height="115"/>
  <text class="label" x="545" y="853">ST_REVIEW_OFFSET_POLICY</text>
  <text class="small" x="545" y="878">Gain, MaxOffset, MinSample</text>
  <text class="small" x="545" y="902">누적 여부 / 다음 Plan 반영 여부</text>
  <rect class="box review" x="915" y="820" width="330" height="115"/>
  <text class="label" x="940" y="853">ST_REVIEW_HEAD_OFFSET</text>
  <text class="small" x="940" y="878">HeadNo, OffsetX/Y, Theta</text>
  <text class="small" x="940" y="902">SampleCount, Source</text>
  <rect class="box review" x="1310" y="820" width="385" height="115"/>
  <text class="label" x="1335" y="853">CReviewCorrectionManager</text>
  <text class="small" x="1335" y="878">측정 Error 평균 -> Offset 계산</text>
  <text class="small" x="1335" y="902">Hxx_OFFSET_X/Y 파라미터 갱신</text>
  <path class="arrow" d="M455 878 L520 878"/>
  <path class="arrow" d="M850 878 L915 878"/>
  <path class="arrow" d="M1245 878 L1310 878"/>
</svg>