<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2360" viewBox="0 0 1800 2360">
  <defs>
    <style>
      .bg{fill:#07111f}
      .panel{fill:#111827;stroke:#334155;stroke-width:1.5;rx:14}
      .input{fill:#172554;stroke:#60a5fa;stroke-width:1.8;rx:12}
      .calc{fill:#0f3b46;stroke:#22d3ee;stroke-width:1.8;rx:12}
      .scanner{fill:#2d1f10;stroke:#f59e0b;stroke-width:1.8;rx:12}
      .aux{fill:#301a0a;stroke:#fb923c;stroke-width:1.8;rx:12}
      .review{fill:#3b1632;stroke:#f472b6;stroke-width:1.8;rx:12}
      .ok{fill:#052e1b;stroke:#34d399;stroke-width:1.8;rx:12}
      .warn{fill:#3b2607;stroke:#fbbf24;stroke-width:1.8;rx:12}
      .title{font-family:Segoe UI,Arial,sans-serif;font-size:34px;font-weight:700;fill:#e5f0ff}
      .subtitle{font-family:Segoe UI,Arial,sans-serif;font-size:17px;fill:#a9bdd8}
      .section{font-family:Segoe UI,Arial,sans-serif;font-size:23px;font-weight:700;fill:#eaf2ff}
      .h{font-family:Segoe UI,Arial,sans-serif;font-size:18px;font-weight:700;fill:#f8fbff}
      .t{font-family:Segoe UI,Arial,sans-serif;font-size:14px;fill:#d5e3f5}
      .small{font-family:Consolas,Menlo,monospace;font-size:13px;fill:#d7e7f8}
      .tiny{font-family:Segoe UI,Arial,sans-serif;font-size:12px;fill:#b7c7da}
      .note{font-family:Segoe UI,Arial,sans-serif;font-size:13px;fill:#fde68a}
      .board{fill:#08111f;stroke:#64748b;stroke-width:2}
      .cell{fill:#0e7490;stroke:#67e8f9;stroke-width:1;opacity:.8}
      .target{fill:#f59e0b;stroke:#fde68a;stroke-width:2}
      .scannerHead{fill:#1d4ed8;stroke:#7dd3fc;stroke-width:2}
      .fov{fill:#0891b250;stroke:#22d3ee;stroke-width:2;stroke-dasharray:8 5}
      .axis{stroke:#94a3b8;stroke-width:2;marker-end:url(#arrowGray)}
      .arrow{stroke:#93a4b8;stroke-width:2.2;fill:none;marker-end:url(#arrowGray)}
      .arrowC{stroke:#22d3ee;stroke-width:2.5;fill:none;marker-end:url(#arrowCyan)}
      .arrowO{stroke:#f59e0b;stroke-width:2.5;fill:none;marker-end:url(#arrowOrange)}
      .dash{stroke:#fbbf24;stroke-width:2;fill:none;stroke-dasharray:8 6;marker-end:url(#arrowYellow)}
    </style>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#93a4b8"/>
    </marker>
    <marker id="arrowCyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowYellow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1800" height="2360" class="bg"/>
  <text x="44" y="58" class="title">MOF Coordinate Transform Flow: Review 기준 좌표에서 Scanner GX/GY 지령까지</text>
  <text x="46" y="92" class="subtitle">핵심: Global/Stage 가공점은 Scanner 중심 기준 상대좌표로 바뀌고, AUX Feedback은 그 좌표를 언제 쏠지 결정하는 Stage 동기화 입력이다.</text>

  <rect x="40" y="126" width="1720" height="132" class="panel"/>
  <text x="64" y="162" class="section">0. 좌표계 역할 요약</text>
  <text x="64" y="192" class="t">Recipe/Design 좌표계는 기판 내부 패턴을 설명하고, Review 좌표계는 AK1 측정으로 기판 위치를 Stage Global에 붙인다.</text>
  <text x="64" y="218" class="t">Stage Global 좌표계는 Review Camera, Scanner 중심, 기판 가공점을 같은 장비 기준으로 정렬한다.</text>
  <text x="64" y="244" class="t">Scanner GX/GY 좌표계는 “해당 Scanner 중심에서 목표점이 얼마나 떨어져 있는가”를 스캐너 내부 field 좌표로 표현한 것이다.</text>

  <rect x="40" y="292" width="1720" height="250" class="panel"/>
  <text x="64" y="328" class="section">1. Review Camera 측정으로 Stage Global 가공점 생성</text>
  <rect x="70" y="360" width="360" height="130" class="input"/>
  <text x="94" y="392" class="h">1-1. AK1 Review 측정</text>
  <text x="94" y="420" class="small">dU = MeasuredAk1U - PixelCenterU</text>
  <text x="94" y="444" class="small">dV = MeasuredAk1V - PixelCenterV</text>
  <text x="94" y="468" class="small">AK1stage = ReviewCenter + pixelScale*dUV</text>

  <rect x="500" y="360" width="360" height="130" class="calc"/>
  <text x="524" y="392" class="h">1-2. Cell / PPID Pattern</text>
  <text x="524" y="420" class="small">LocalX = CellAlignX + col*Pitch</text>
  <text x="524" y="444" class="small">LocalY = CellAlignY + row*Pitch</text>
  <text x="524" y="468" class="small">Mask / Chess / DOE 조건은 target list 필터</text>

  <rect x="930" y="360" width="360" height="130" class="calc"/>
  <text x="954" y="392" class="h">1-3. 기판 회전 보정</text>
  <text x="954" y="420" class="small">BoardLocalRot = R(thetaAlign)*Local</text>
  <text x="954" y="444" class="small">DesignStage = AK1stage + BoardLocalRot</text>
  <text x="954" y="468" class="small">ProcessStage = DesignStage + ProcessOffset</text>

  <rect x="1360" y="360" width="330" height="130" class="ok"/>
  <text x="1384" y="392" class="h">결과</text>
  <text x="1384" y="420" class="small">P_global = (Xstage, Ystage)</text>
  <text x="1384" y="444" class="small">장비 Stage 기준 가공 목표점</text>
  <text x="1384" y="468" class="tiny">아직 Scanner GX/GY가 아니다.</text>

  <path class="arrowC" d="M430 425 H500"/>
  <path class="arrowC" d="M860 425 H930"/>
  <path class="arrowC" d="M1290 425 H1360"/>

  <rect x="40" y="580" width="1720" height="355" class="panel"/>
  <text x="64" y="616" class="section">2. Scanner 중심 위치를 Stage Global에 정의</text>
  <text x="64" y="646" class="t">각 Scanner는 장비에 고정되어 있으므로, Scanner 중심도 Stage Global 기준의 고정 좌표로 표현할 수 있다.</text>

  <rect x="70" y="680" width="470" height="180" class="scanner"/>
  <text x="94" y="714" class="h">2-1. Review Camera → Scanner 물리 Offset</text>
  <text x="94" y="746" class="small">C_review = (ReviewCenterGlobalX, ReviewCenterGlobalY)</text>
  <text x="94" y="772" class="small">O_RS_H1 = (ReviewToFirstScannerOffsetX, Y)</text>
  <text x="94" y="798" class="small">C_scanner_H1 = C_review + O_RS_H1</text>
  <text x="94" y="824" class="tiny">Review와 Scanner가 물리적으로 떨어져 있는 고정 거리.</text>

  <rect x="610" y="680" width="470" height="180" class="scanner"/>
  <text x="634" y="714" class="h">2-2. Multi Scanner Zigzag 배치</text>
  <text x="634" y="746" class="small">C_scanner_i.X = C_H1.X + (i-1)*ScannerPitchX</text>
  <text x="634" y="772" class="small">C_scanner_i.Y = C_H1.Y + evenYOffset(i)</text>
  <text x="634" y="798" class="small">Task i uses axes: GXi, GYi</text>
  <text x="634" y="824" class="tiny">H1=GX1/GY1, H2=GX2/GY2 ...</text>

  <rect x="1150" y="680" width="500" height="180" class="warn"/>
  <text x="1174" y="714" class="h">검증</text>
  <text x="1174" y="746" class="small">ExpectedH1 = ReviewCenter + PhysicalOffset</text>
  <text x="1174" y="772" class="small">OriginError = FirstScannerInitialStage - ExpectedH1</text>
  <text x="1174" y="798" class="small">abs(OriginError) &lt;= ScannerOriginTolerance</text>
  <text x="1174" y="824" class="tiny">불일치하면 Global→GX/GY 기준 자체가 틀어진다.</text>

  <path class="arrowO" d="M540 770 H610"/>
  <path class="arrowO" d="M1080 770 H1150"/>

  <rect x="40" y="972" width="1720" height="430" class="panel"/>
  <text x="64" y="1008" class="section">3. Global 가공 좌표를 Scanner GX/GY 지령으로 바꾸는 원리</text>
  <text x="64" y="1038" class="t">가장 중요한 변환은 “목표점에서 Scanner 중심을 뺀다”이다. 즉 Scanner가 보는 좌표는 장비 전체 좌표가 아니라 자기 중심 기준 상대 좌표이다.</text>

  <rect x="70" y="1080" width="430" height="250" class="calc"/>
  <text x="94" y="1114" class="h">3-1. Stage Global → Scanner Local</text>
  <text x="94" y="1146" class="small">D_i = P_process_global - C_scanner_i</text>
  <text x="94" y="1172" class="small">D_i.X = TargetStageX - ScannerCenterX</text>
  <text x="94" y="1198" class="small">D_i.Y = TargetStageY - ScannerCenterY</text>
  <text x="94" y="1232" class="t">D_i는 “목표점이 현재 Scanner 중심에서</text>
  <text x="94" y="1255" class="t">X/Y로 얼마나 떨어져 있는가”를 뜻한다.</text>
  <text x="94" y="1288" class="note">이 값이 Scanner field half 범위 안이어야 해당 head가 가공 가능하다.</text>

  <rect x="560" y="1080" width="430" height="250" class="scanner"/>
  <text x="584" y="1114" class="h">3-2. Scanner 축 방향 / 부호 / 보정</text>
  <text x="584" y="1146" class="small">[GXraw, GYraw] = S_i * R_cal_i * D_i</text>
  <text x="584" y="1172" class="small">S_i = scale/sign matrix</text>
  <text x="584" y="1198" class="small">R_cal_i = scanner rotation/calibration</text>
  <text x="584" y="1232" class="t">Odd/Even 배치, 광학 반전, 축 부호,</text>
  <text x="584" y="1255" class="t">스캐너 보정 파일의 회전/스케일이 여기서 반영된다.</text>
  <text x="584" y="1288" class="note">현재 예제코드는 head별 sign rule과 calibration parameter를 이 계층에 둔다.</text>

  <rect x="1050" y="1080" width="430" height="250" class="ok"/>
  <text x="1074" y="1114" class="h">3-3. AeroScript GX/GY Command</text>
  <text x="1074" y="1146" class="small">MoveRapid([GYi, GXi], [GYcmd, GXcmd])</text>
  <text x="1074" y="1172" class="small">or G0 GXi GXcmd GYi GYcmd</text>
  <text x="1074" y="1198" class="small">Task i executes only head i command list</text>
  <text x="1074" y="1232" class="t">이 숫자가 실제 Scanner 내부 field 좌표로 들어간다.</text>
  <text x="1074" y="1255" class="t">Global Stage 좌표를 그대로 넣는 것이 아니다.</text>
  <text x="1074" y="1288" class="note">H1 command는 Task1/GX1/GY1, H2는 Task2/GX2/GY2.</text>

  <path class="arrowC" d="M500 1205 H560"/>
  <path class="arrowC" d="M990 1205 H1050"/>

  <rect x="1505" y="1080" width="210" height="250" class="review"/>
  <text x="1528" y="1114" class="h">Review 좌표 재생성</text>
  <text x="1528" y="1146" class="small">ReviewPoint =</text>
  <text x="1528" y="1170" class="small">ScannerLocal</text>
  <text x="1528" y="1194" class="small">+ PhysicalOffset</text>
  <text x="1528" y="1218" class="small">+ DOE offset</text>
  <text x="1528" y="1255" class="t">가공 후 Review 측정과</text>
  <text x="1528" y="1278" class="t">보정량 계산에 사용.</text>

  <path class="arrow" d="M1480 1205 H1505"/>

  <rect x="40" y="1440" width="1720" height="410" class="panel"/>
  <text x="64" y="1476" class="section">4. AUX Feedback이 하는 일: 좌표 변환이 아니라 Moving Stage 동기화</text>
  <text x="64" y="1506" class="t">현장 구성에서는 Stage Y가 Aerotech 축이 아니다. 외부 Stage encoder A/B가 Scanner GY AUX로 들어오고, Automation1은 그 값을 읽어 “Stage가 여기까지 왔을 때”를 판단한다.</text>

  <rect x="70" y="1548" width="390" height="230" class="aux"/>
  <text x="94" y="1582" class="h">4-1. 외부 Stage 이동량</text>
  <text x="94" y="1614" class="small">AuxFeedback_count = StageTravel_mm * 16000</text>
  <text x="94" y="1640" class="small">StageTravel_mm = reverse MOF 진행 거리</text>
  <text x="94" y="1666" class="small">wait(AuxFeedback &gt; thresholdCount)</text>
  <text x="94" y="1700" class="t">AUX count는 Stage Y 실제 이동량의 피드백이다.</text>
  <text x="94" y="1723" class="t">GX/GY 좌표 그 자체가 아니다.</text>

  <rect x="520" y="1548" width="420" height="230" class="aux"/>
  <text x="544" y="1582" class="h">4-2. MOF 타이밍</text>
  <text x="544" y="1614" class="small">wait(Stage reaches target Y band)</text>
  <text x="544" y="1640" class="small">MoveRapid([GYi,GXi], [GYcmd,GXcmd])</text>
  <text x="544" y="1666" class="small">Laser On / Shot Delay / Laser Off</text>
  <text x="544" y="1700" class="t">Stage가 계속 움직이므로 Y 방향은 시간/encoder로 맞추고,</text>
  <text x="544" y="1723" class="t">Scanner는 해당 순간 field 안의 상대좌표로 점프한다.</text>

  <rect x="1000" y="1548" width="420" height="230" class="aux"/>
  <text x="1024" y="1582" class="h">4-3. Aerotech 내부 MOF 보정 개념</text>
  <text x="1024" y="1614" class="small">GalvoEncoderScaleFactorSet(GYi, scale)</text>
  <text x="1024" y="1640" class="small">DriveSetAuxiliaryFeedback(GYi, 0)</text>
  <text x="1024" y="1666" class="small">StatusGetAxisItem(GYi, AuxiliaryFeedback)</text>
  <text x="1024" y="1700" class="t">AUX encoder와 Galvo 축을 연결해 움직이는 기판 위에서</text>
  <text x="1024" y="1723" class="t">스캐너 위치가 Stage 이동을 따라 보상되도록 한다.</text>

  <rect x="1480" y="1548" width="230" height="230" class="warn"/>
  <text x="1504" y="1582" class="h">정리</text>
  <text x="1504" y="1614" class="small">GX/GY = local field</text>
  <text x="1504" y="1640" class="small">AUX = Stage timing</text>
  <text x="1504" y="1666" class="small">PSO/Laser = shot event</text>
  <text x="1504" y="1700" class="t">세 값은 연결되어 있지만</text>
  <text x="1504" y="1723" class="t">같은 좌표계가 아니다.</text>

  <path class="arrowO" d="M460 1660 H520"/>
  <path class="arrowO" d="M940 1660 H1000"/>
  <path class="arrowO" d="M1420 1660 H1480"/>

  <rect x="40" y="1888" width="1720" height="308" class="panel"/>
  <text x="64" y="1924" class="section">5. 한 점에 대한 계산 예시 형태</text>
  <rect x="70" y="1968" width="400" height="170" class="input"/>
  <text x="94" y="2002" class="h">입력</text>
  <text x="94" y="2034" class="small">P_process_global = (864.816, 1640.763)</text>
  <text x="94" y="2060" class="small">C_scanner_H1    = (479.700, 1640.100)</text>
  <text x="94" y="2086" class="small">FieldHalfX/Y    = scanner field limit</text>

  <rect x="530" y="1968" width="400" height="170" class="calc"/>
  <text x="554" y="2002" class="h">상대좌표</text>
  <text x="554" y="2034" class="small">D_H1 = P_process_global - C_H1</text>
  <text x="554" y="2060" class="small">D_H1 = (385.116, 0.663)</text>
  <text x="554" y="2086" class="tiny">예시 수치. 실제 field limit 밖이면 H1 가공 대상 아님.</text>

  <rect x="990" y="1968" width="400" height="170" class="scanner"/>
  <text x="1014" y="2002" class="h">스캐너 내부 좌표</text>
  <text x="1014" y="2034" class="small">[GX, GY] = S_H1 * R_cal_H1 * D_H1</text>
  <text x="1014" y="2060" class="small">sign / rotation / scale / offset 적용</text>
  <text x="1014" y="2086" class="tiny">프로그램 결과의 Gx/Gy는 이 계층의 결과값.</text>

  <rect x="1450" y="1968" width="260" height="170" class="ok"/>
  <text x="1474" y="2002" class="h">AeroScript</text>
  <text x="1474" y="2034" class="small">Task1:</text>
  <text x="1474" y="2060" class="small">MoveRapid([GY1,GX1],</text>
  <text x="1474" y="2086" class="small">          [GYcmd,GXcmd])</text>

  <path class="arrowC" d="M470 2054 H530"/>
  <path class="arrowC" d="M930 2054 H990"/>
  <path class="arrowC" d="M1390 2054 H1450"/>

  <rect x="40" y="2226" width="1720" height="90" class="panel"/>
  <text x="64" y="2262" class="section">핵심 결론</text>
  <text x="64" y="2294" class="t">Global 가공 좌표를 GX/GY로 바꾸는 이론적 원리는 좌표계 원점 이동과 좌표축 변환이다. 목표 Stage 좌표에서 Scanner 중심 Stage 좌표를 빼서 Scanner local vector를 만들고, 여기에 스캐너 축 부호, 회전, 스케일, 광학 보정값을 적용하면 GX/GY 지령이 된다.</text>
  <text x="64" y="2320" class="t">AUX Feedback은 이 변환식의 좌표값을 만드는 항이 아니라, 외부 Stage가 움직이는 동안 “언제 그 GX/GY 지령과 Laser shot을 실행할지”를 결정하는 동기화 기준이다.</text>
</svg>
