<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <style>
      .bg{fill:#08111f}.panel{fill:#101b2d;stroke:#334155;stroke-width:2}.cyan{fill:#0d2d42;stroke:#22d3ee;stroke-width:2}.blue{fill:#172554;stroke:#60a5fa;stroke-width:2}.green{fill:#073b2d;stroke:#34d399;stroke-width:2}.warn{fill:#3a2b0a;stroke:#fbbf24;stroke-width:2}.title{fill:#f8fafc;font:700 30px 'Malgun Gothic',sans-serif}.sub{fill:#cbd5e1;font:16px 'Malgun Gothic',sans-serif}.h{fill:#f8fafc;font:700 19px 'Malgun Gothic',sans-serif}.t{fill:#dbeafe;font:15px 'Malgun Gothic',sans-serif}.s{fill:#94a3b8;font:13px 'Malgun Gothic',sans-serif}.code{fill:#bae6fd;font:14px Consolas,monospace}.big{fill:#67e8f9;font:700 23px Consolas,monospace}.arrow{stroke:#67e8f9;stroke-width:3;fill:none;marker-end:url(#head)}.flow{stroke:#34d399;stroke-width:5;fill:none;marker-end:url(#greenHead)}.dash{stroke:#fbbf24;stroke-width:3;stroke-dasharray:8 6;fill:none}
    </style>
    <marker id="head" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#67e8f9"/></marker>
    <marker id="greenHead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#34d399"/></marker>
  </defs>
  <rect class="bg" width="1600" height="1100"/>
  <text x="55" y="52" class="title">Automation1 Virtual Counter Simulation: Stage Y축 없이 MOF 순서 확인</text>
  <text x="55" y="82" class="sub">실제 타사 Stage가 없는 가상 환경에서는 Script 내부 소프트웨어 카운터를 움직이고, WPF가 그 값을 읽어 화면에 보여줍니다.</text>

  <rect x="45" y="112" width="1510" height="165" rx="8" class="warn"/>
  <text x="75" y="150" class="h">가장 중요한 차이</text>
  <text x="75" y="184" class="t">생성하지 않는 것: Y축 선언 · MoveAbsolute(Y) · Stage PositionFeedback · Hardware AUX · Laser · PSO</text>
  <text x="75" y="216" class="t">생성하는 것: Scanner GX/GY 이동 + 속도×Tick으로 증가/감소하는 Virtual Stage Y + 현재 가공 순번</text>
  <text x="75" y="248" class="s">따라서 이 모드는 “실제 빛이 나오는지”가 아니라 “좌표 순서, 대기 시점, 화면 진행 표시가 맞는지”를 확인하는 용도입니다.</text>

  <rect x="45" y="310" width="720" height="330" rx="8" class="panel"/>
  <text x="75" y="348" class="h">1. 가상 Stage는 어떻게 움직이나요?</text>
  <text x="75" y="385" class="t">예: 시작 위치 500 mm, 속도 20 mm/s, Tick 0.02 s</text>
  <text x="75" y="430" class="big">한 Tick 이동량 = 20 × 0.02 = 0.4 mm</text>
  <text x="75" y="472" class="t">500.0 → 500.4 → 500.8 → ... → 목표 위치</text>
  <text x="75" y="505" class="s">목표를 지나치면 마지막 값을 목표 위치로 맞추고 다음 가공 좌표를 실행합니다.</text>
  <rect x="75" y="535" width="650" height="75" rx="6" class="cyan"/>
  <text x="100" y="566" class="code">AdvanceVirtualStageCounter(targetY, speed, tick, direction)</text>
  <text x="100" y="593" class="s">Dwell(tick) → 현재 위치 갱신 → 목표 도착 여부 반복 확인</text>

  <rect x="805" y="310" width="750" height="330" rx="8" class="panel"/>
  <text x="835" y="348" class="h">2. Script와 WPF가 함께 보는 공용 변수</text>
  <rect x="835" y="378" width="690" height="50" rx="5" class="blue"/>
  <text x="860" y="410" class="code">$rglobal[0] = 현재 Virtual Stage Y 위치</text>
  <rect x="835" y="440" width="690" height="50" rx="5" class="blue"/>
  <text x="860" y="472" class="code">$rglobal[1] = 이동 속도 · $rglobal[2] = 다음 목표 위치</text>
  <rect x="835" y="502" width="690" height="50" rx="5" class="green"/>
  <text x="860" y="534" class="code">$iglobal[0] = 현재 가공 번호 · $iglobal[1] = 전체 가공 개수</text>
  <text x="835" y="590" class="t">WPF가 약 300 ms마다 값을 읽어 진행률과 현재 Cell을 갱신합니다.</text>
  <text x="835" y="617" class="s">예: 125 / 600, Virtual Stage Y = 742.4 mm, Cell#3 C7 가공 중</text>

  <rect x="45" y="675" width="1510" height="230" rx="8" class="panel"/>
  <text x="75" y="713" class="h">3. 역물류 MOF 가공 순서: AK1 쪽에서 AK2 쪽으로</text>
  <circle cx="120" cy="790" r="15" fill="#fbbf24"/><text x="90" y="835" class="t">AK1</text>
  <path d="M145 790 H1450" class="flow"/>
  <circle cx="1480" cy="790" r="15" fill="#fbbf24"/><text x="1450" y="835" class="t">AK2</text>
  <rect x="205" y="755" width="185" height="70" rx="5" class="cyan"/><text x="230" y="783" class="h">가공 #1</text><text x="230" y="808" class="s">LocalY가 작은 점</text>
  <rect x="465" y="755" width="185" height="70" rx="5" class="cyan"/><text x="490" y="783" class="h">가공 #2</text><text x="490" y="808" class="s">다음 LocalY</text>
  <rect x="725" y="755" width="185" height="70" rx="5" class="cyan"/><text x="750" y="783" class="h">가공 #3</text><text x="750" y="808" class="s">같으면 LocalX</text>
  <rect x="985" y="755" width="185" height="70" rx="5" class="cyan"/><text x="1010" y="783" class="h">가공 #4</text><text x="1010" y="808" class="s">차례대로 실행</text>
  <text x="75" y="872" class="s">정렬 기준: LocalY 오름차순 → LocalX 오름차순 → Scanner 번호. Stage 이동 부호와 무관하게 기판 기준 순서를 일정하게 유지합니다.</text>

  <rect x="45" y="940" width="480" height="120" rx="8" class="green"/>
  <text x="70" y="974" class="h">확인할 수 있는 것</text>
  <text x="70" y="1006" class="t">가공 순서 · Scanner 좌표 · 대기 시간</text>
  <text x="70" y="1034" class="t">진행률 · 현재 Cell 강조 · Task 완료/오류</text>

  <rect x="560" y="940" width="480" height="120" rx="8" class="warn"/>
  <text x="585" y="974" class="h">확인할 수 없는 것</text>
  <text x="585" y="1006" class="t">실제 Laser 출력 · PSO Pulse · AUX 전기 신호</text>
  <text x="585" y="1034" class="t">Encoder Noise · 광학 Calibration · 동기 정밀도</text>

  <rect x="1075" y="940" width="480" height="120" rx="8" class="blue"/>
  <text x="1100" y="974" class="h">실제 설비 전환 시</text>
  <text x="1100" y="1006" class="t">External AUX 또는 Equipment 모드 선택</text>
  <text x="1100" y="1034" class="t">MCD·축·Limit·Interlock·Laser 조건 재검증</text>
</svg>
