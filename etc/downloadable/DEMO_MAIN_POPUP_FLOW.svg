<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .title { font: 700 34px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #102033; }
      .sub { font: 500 18px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #5a6b80; }
      .label { font: 700 19px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #172033; }
      .small { font: 500 15px "Malgun Gothic", "Segoe UI", Arial, sans-serif; fill: #405060; }
      .box { stroke-width: 2; rx: 12; ry: 12; }
      .ui { fill: #e8f1ff; stroke: #3b73d9; }
      .common { fill: #fff3df; stroke: #d88924; }
      .review { fill: #e8fbfb; stroke: #139aa2; }
      .data { fill: #eaf7ee; stroke: #3b8f4f; }
      .lane { fill: #ffffff; stroke: #d4dce7; stroke-width: 1.6; rx: 18; ry: 18; }
      .arrow { stroke: #56677a; stroke-width: 2.4; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4.5 L0,9 z" fill="#56677a"/>
    </marker>
  </defs>
  <rect class="bg" width="1800" height="1080"/>
  <text class="title" x="70" y="62">Demo Main UI와 설명 팝업 흐름</text>
  <text class="sub" x="72" y="96">Main 화면만 보여주고, 버튼별 팝업으로 구조/공정/리뷰보정/데이터 흐름을 설명하는 구성</text>

  <rect class="lane" x="55" y="135" width="1690" height="250"/>
  <text class="label" x="85" y="176">1. 화면 구성</text>
  <rect class="box ui" x="95" y="220" width="300" height="90"/>
  <text class="label" x="120" y="253">Main Demo Screen</text>
  <text class="small" x="120" y="278">Main Status / Head Preview</text>
  <rect class="box ui" x="470" y="220" width="300" height="90"/>
  <text class="label" x="495" y="253">Process Flow</text>
  <text class="small" x="495" y="278">PLAN부터 COMPLETE까지</text>
  <rect class="box review" x="845" y="220" width="300" height="90"/>
  <text class="label" x="870" y="253">Review Offset Base</text>
  <text class="small" x="870" y="278">측정 Batch / Offset 계산</text>
  <rect class="box common" x="1220" y="220" width="430" height="90"/>
  <text class="label" x="1245" y="253">Run Demo Flow / Stop</text>
  <text class="small" x="1245" y="278">StationProcess 흐름 시연</text>
  <path class="arrow" d="M395 265 L470 265"/>
  <path class="arrow" d="M770 265 L845 265"/>
  <path class="arrow" d="M1145 265 L1220 265"/>

  <rect class="lane" x="55" y="430" width="1690" height="285"/>
  <text class="label" x="85" y="470">2. 설명 팝업 버튼</text>
  <rect class="box common" x="95" y="525" width="330" height="95"/>
  <text class="label" x="120" y="558">시작/매니저</text>
  <text class="small" x="120" y="584">App → CAppStartup → CManager</text>
  <rect class="box common" x="505" y="525" width="330" height="95"/>
  <text class="label" x="530" y="558">공정 흐름</text>
  <text class="small" x="530" y="584">ProcessPlan → Script → Product</text>
  <rect class="box review" x="915" y="525" width="330" height="95"/>
  <text class="label" x="940" y="558">리뷰 보정</text>
  <text class="small" x="940" y="584">Review Batch → Head Offset</text>
  <rect class="box data" x="1325" y="525" width="330" height="95"/>
  <text class="label" x="1350" y="558">데이터 구조</text>
  <text class="small" x="1350" y="584">CSV → record → Manager → UI</text>

  <rect class="lane" x="55" y="760" width="1690" height="230"/>
  <text class="label" x="85" y="800">3. 설명자가 말하기 쉬운 핵심 문장</text>
  <rect class="box data" x="95" y="845" width="1560" height="90"/>
  <text class="small" x="120" y="878">이 프로젝트는 실제 장비 기능 완성본이 아니라 구조 설명용 데모입니다. Main 화면에서 공정 상태를 보고, 버튼 팝업으로 데이터 구조와 흐름을 설명합니다.</text>
  <text class="small" x="120" y="905">Review Offset은 실제 Vision/APC I/F 전 단계의 base 구조이며, 측정값이 들어오면 Head별 Offset으로 계산해 다음 ProcessPlan에 반영하는 위치를 코드에 표시했습니다.</text>
</svg>